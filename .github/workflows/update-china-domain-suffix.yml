name: Update China Domain Suffix

on:
  schedule:
    # 每天新加坡/中国时间 02:00 执行；GitHub cron 使用 UTC
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Generate China domain suffix list
        run: |
          chmod +x scripts/update-china-domain-suffix.sh
          ./scripts/update-china-domain-suffix.sh

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- China_Domain_Suffix.list; then
            echo "No changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add China_Domain_Suffix.list
          git commit -m "Update China domain suffix list"
          git push
